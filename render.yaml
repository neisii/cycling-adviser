services:
  - type: web
    name: cycling-advisor
    runtime: static
    region: singapore
    plan: free
    buildCommand: >-
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/cycling-advisor run build
    staticPublishPath: ./artifacts/cycling-advisor/dist/public
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_BASE_URL
        value: https://weather-proxy.neisii.workers.dev
