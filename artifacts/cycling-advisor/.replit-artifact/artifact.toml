kind = "web"
previewPath = "/"
title = "사이클링 날씨 어드바이저"
version = "1.0.0"
id = "artifacts/cycling-advisor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25831

[services.development]
run = "pnpm --filter @workspace/cycling-advisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cycling-advisor", "run", "build" ]
publicDir = "artifacts/cycling-advisor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25831"
BASE_PATH = "/"
